<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPLO Login</title>
    <script defer src="/config.js?v=3"></script>
    <link rel="stylesheet" href="/styles/login.css?v=2" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/features/login.js?v=3"></script>
  </head>
  <body>
    <main class="login-page">
      <section class="brand-panel" aria-label="Municipality of Victoria, Laguna">
        <img
          class="municipal-seal"
          src="../assets/victoria-laguna-seal.png"
          alt="Municipality of Victoria, Laguna seal"
        />
      </section>

      <section class="form-panel" aria-label="BPLO sign in">
        <form class="login-card" action="#" method="post">
          <header class="card-header">
            <h1>Business Process<br />Licensing Office</h1>
          </header>

          <div class="form-group">
            <label for="email">Login into BPLO</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="Enter Email Address"
              required
            />
          </div>

          <div class="form-group password-group">
            <label class="sr-only" for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="Enter Password"
              required
            />
          </div>

          <button class="login-button" type="submit">Log in</button>
          <a class="forgot-link" href="#">Forgot Password?</a>
          <p class="auth-status" data-login-status aria-live="polite"></p>

          <a class="create-account" href="/register">Create Account</a>
        </form>
      </section>
    </main>
  </body>
</html>
