<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPLO Applicant - My Documents</title>
    <script defer src="/config.js?v=8"></script>
    <link rel="stylesheet" href="/styles/applicant.css?v=20" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="/features/logout_modal.js?v=1"></script>
    <script defer src="/features/applicant_self_service.js?v=1"></script>
  </head>
  <body data-applicant-page="documents">
    <main class="app-shell">
      <header class="topbar">
        <a class="brand-mark" href="/applicant" aria-label="BPLO applicant home"><img src="/assets/Victoria.png" alt="Municipality of Victoria, Laguna seal" /></a>
        <nav class="topnav" aria-label="Applicant navigation">
          <a href="/applicant">Home</a>
          <a href="/applicant/permits">My Application</a>
          <div class="profile-menu">
            <button class="profile-button" type="button" data-profile-toggle>Profile<i data-lucide="chevron-down" aria-hidden="true"></i></button>
            <div class="profile-dropdown" data-profile-dropdown"><strong data-profile-name>Applicant</strong><button type="button" data-logout>Log out</button></div>
          </div>
          <span class="avatar" aria-hidden="true"></span>
        </nav>
      </header>

      <section class="dashboard applicant-records-page">
        <section class="permits-section" aria-labelledby="documents-title">
          <header class="records-header">
            <div>
              <h2 id="documents-title">MY DOCUMENTS</h2>
              <p data-record-status>Loading your documents...</p>
            </div>
          </header>
          <div class="records-toolbar">
            <input type="search" placeholder="Search filename or document type" data-document-search />
            <select data-document-application-filter><option value="">All applications</option></select>
            <select data-document-category-filter><option value="">All categories</option></select>
            <select data-document-status-filter><option value="">All statuses</option></select>
            <input type="date" aria-label="Upload date" data-document-date-filter />
          </div>
          <div class="permits-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>DOCUMENT</th>
                  <th>CATEGORY</th>
                  <th>APPLICATION</th>
                  <th>STATUS</th>
                  <th>UPLOAD DATE</th>
                  <th>ACTION</th>
                </tr>
              </thead>
              <tbody data-documents-body>
                <tr><td colspan="6" class="empty-state">Loading documents...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="records-pagination" data-document-pagination></div>
        </section>
      </section>

      <section class="record-modal" data-document-modal hidden>
        <div class="record-modal__backdrop" data-close-modal></div>
        <article class="record-modal__card record-modal__card--wide" role="dialog" aria-modal="true" aria-labelledby="document-modal-title">
          <header><h2 id="document-modal-title">Document Preview</h2><button type="button" data-close-modal><i data-lucide="x" aria-hidden="true"></i></button></header>
          <div data-document-modal-body></div>
        </article>
      </section>

      <footer class="site-footer">
        <p>&copy; 2024 BPLO Permit System. All rights reserved.</p>
        <p>For support, contact: <a href="mailto:support@bplo.gov.ph">support@bplo.gov.ph</a></p>
      </footer>
    </main>
  </body>
</html>
