<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPLO Application Type</title>
    <script defer src="/config.js?v=8"></script>
    <link rel="stylesheet" href="/styles/applicant.css?v=21" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="/features/logout_modal.js?v=1"></script>
    <script defer src="/features/applicant.js?v=22"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <a class="brand-mark" href="/applicant" aria-label="BPLO applicant home">
          <img src="/assets/Victoria.png" alt="Municipality of Victoria, Laguna seal" />
        </a>

        <nav class="topnav" aria-label="Applicant navigation">
          <a href="/applicant">Home</a>
          <a href="#">My Application</a>
          <div class="profile-menu">
            <button class="profile-button" type="button" data-profile-toggle>
              Profile
              <i data-lucide="chevron-down" aria-hidden="true"></i>
            </button>
            <div class="profile-dropdown" data-profile-dropdown>
              <strong data-profile-name>Applicant</strong>
              <button type="button" data-logout>Log out</button>
            </div>
          </div>
          <div class="notification-menu" data-notification-menu>
            <button class="icon-button notification-button" type="button" aria-label="Notifications" data-notification-toggle>
              <i data-lucide="bell" aria-hidden="true"></i>
              <span class="notification-badge" data-notification-count hidden>0</span>
            </button>
            <div class="notification-dropdown" data-notification-dropdown>
              <header>
                <strong>Notifications</strong>
                <button type="button" data-mark-all-notifications-read>Mark all as read</button>
              </header>
              <div class="notification-list" data-notification-list>
                <p class="notification-empty">No notifications yet.</p>
              </div>
            </div>
          </div>
          <span class="avatar" aria-hidden="true"></span>
        </nav>
      </header>

      <section class="application-type-page">
        <h1 class="application-type-title">Application Type</h1>

        <div class="application-type-grid">
          <article class="application-type-card">
            <div class="application-type-icon application-type-icon--new" aria-hidden="true">
              <i data-lucide="file-plus-2"></i>
            </div>
            <h2>New Application</h2>
            <a class="type-action-button" href="/applicant/business-permit?type=new">Start Application</a>
          </article>

          <article class="application-type-card">
            <div class="application-type-icon application-type-icon--renewal" aria-hidden="true">
              <i data-lucide="refresh-cw"></i>
            </div>
            <h2>Renewal Application</h2>
            <button class="type-action-button" type="button" data-start-latest-renewal>Start Renewal</button>
          </article>
        </div>
      </section>

      <footer class="site-footer">
        <p>&copy; 2024 BPLO Permit System. All rights reserved.</p>
        <p>For support, contact: <a href="mailto:support@bplo.gov.ph">support@bplo.gov.ph</a></p>
      </footer>
    </main>
  </body>
</html>
